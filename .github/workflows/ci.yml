name: CI

# Quality gate for pull requests into main. Runs lint, the vitest suite, and a
# full production build (web + admin bundles) so broken code can't merge.
#
# Vercel already builds preview deployments, but it does NOT run eslint or the
# unit tests — so this workflow is what actually enforces "tests + lint pass"
# before merge. Mark the `build-test` job as a required status check on the
# main branch ruleset to make it blocking.
#
# `npm run lint` only fails on eslint errors, not warnings, so the large
# backlog of pre-existing warnings won't block merges; new errors will.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
