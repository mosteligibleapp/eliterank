name: Vote Digest

# Daily vote roll-up for contestants. Replaces the per-vote in-app
# notification with a single nightly summary + push.
#
# 23:00 UTC was the absolute peak vote hour in prod traffic, which lands the
# digest right at the start of the evening engagement window (US Pacific 3pm /
# Eastern 6pm) — fans see "you got X votes yesterday" right as their voters
# are about to vote again. UTC doesn't observe DST, so a single cron entry
# is enough.
#
# Required repo secrets (already configured for fan-weekly-digest):
#   SUPABASE_URL                — https://<ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY   — the service role key from Supabase

on:
  schedule:
    - cron: '0 23 * * *'   # daily 23:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (compute recipients but do not insert/push)'
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Invoke send-vote-digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secret."
            exit 1
          fi
          BODY=$(jq -n --argjson d "$DRY_RUN" '{dry_run: $d}')
          echo "POST ${SUPABASE_URL}/functions/v1/send-vote-digest  body=$BODY"
          HTTP_CODE=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "${SUPABASE_URL%/}/functions/v1/send-vote-digest")
          echo "HTTP $HTTP_CODE"
          jq . /tmp/resp.json || cat /tmp/resp.json
          {
            echo "## Vote digest"
            echo ""
            echo "HTTP $HTTP_CODE"
            echo ""
            echo '```json'
            jq '.summary // .' /tmp/resp.json || cat /tmp/resp.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Edge function returned HTTP $HTTP_CODE"
            exit 1
          fi
          jq -e '.success == true' /tmp/resp.json > /dev/null
